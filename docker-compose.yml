services:
  postgres:
    image: postgres:18.1
    container_name: credpal_postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${POSTGRES_USER}']
      interval: 30s
      timeout: 25s
      retries: 5
      start_period: 30s
    volumes:
      - credpal_postgres_data:/var/lib/postgresql

  redis:
    image: redis:8.4
    container_name: credpal_redis
    ports:
      - 6379:6379
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    volumes:
      - credpal_redis_data:/data

volumes:
  credpal_postgres_data:
  credpal_redis_data:
